services:
  influxdb3:
    image: quay.io/influxdb/influxdb3-core:latest
    container_name: influxdb3
    restart: unless-stopped
    ports:
      - "8181:8181"   # HTTP API (used by our Rust app)
    volumes:
      - influxdb3_data:/var/lib/influxdb3  # Persistent data storage
    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: "dollar-brl-node"
      INFLUXDB3_DB_DIR: "/var/lib/influxdb3"
    command:
      - serve
      - --node-id=dollar-brl-node
      - --object-store=file
      - --data-dir=/var/lib/influxdb3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  influxdb3_data:
    driver: local